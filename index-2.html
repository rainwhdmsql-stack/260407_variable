<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>변수 -2</title>
    <style>
      span{
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <script>
      // 변수 연산
      let x = 100;
      let y = 30
      let total = x + y
      // x와 y를 곱한 식을 변수에 담기
      let multyply = x * y
      // x와 y를 더한 식을 변수에 담기
      console.log(x , y);
      console.log(total);
      document.write(`<p> x와 y를 더한 금액은 <span> ${total} </span></p>`)

      // x와 y를 곱한 금액은 
      console.log(multyply);
      document.write(`<p> x와 y를 곱한 금액은 <span> ${multyply} </span></p>`)

      // x와 y를 나눈 식을 변수에 담기
      let divide = x / y
      // x와 y를 나눈 식을 변수에 담기
      document.write(`<p> x에서 y를 나눈 금액은 <span> ${divide} </span></p>`)

      
    </script>
  </body>
</html>
